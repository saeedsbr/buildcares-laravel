services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      APP_NAME: BuildCares
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: ${APP_URL}
      APP_KEY: ${APP_KEY}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-buildcares}
      DB_USERNAME: ${DB_USERNAME:-buildcares}
      DB_PASSWORD: ${DB_PASSWORD}

      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync

      MAIL_MAILER: smtp
      MAIL_HOST: ${MAIL_HOST:-smtp.mailgun.org}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-anwar@buildcares.com}
      MAIL_FROM_NAME: BuildCares

      CONTACT_RECIPIENT_EMAIL: ${CONTACT_RECIPIENT_EMAIL:-anwar@buildcares.com}
      WHATSAPP_NUMBER: ${WHATSAPP_NUMBER:-447586750755}

      ADMIN_NAME: ${ADMIN_NAME:-Admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@buildcares.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      ADMIN_PASSWORD_RESET: ${ADMIN_PASSWORD_RESET:-false}
    volumes:
      - storage_data:/var/www/html/storage/app/public
      - logs_data:/var/www/html/storage/logs
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-buildcares}
      MYSQL_USER: ${DB_USERNAME:-buildcares}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
  storage_data:
  logs_data:
